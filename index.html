<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#14120F" />
  <title>Digit Dash ⚡ — Speed Decoding Tournament</title>
  <meta name="description" content="Race the clock across four gates — Easy, Medium, Hard, Boss — decoding equations before time runs out. Climb the ladder, chase the community benchmark, unlock hidden stages." />
  <meta property="og:title" content="Digit Dash ⚡ — Speed Decoding Tournament" />
  <meta property="og:description" content="Race the clock across four gates — Easy, Medium, Hard, Boss — decoding equations before time runs out. Can you clear the board?" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/icons/icon-512.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Digit Dash ⚡ — Speed Decoding Tournament" />
  <meta name="twitter:description" content="Race the clock across four gates before time runs out. Can you clear the board?" />
  <meta name="twitter:image" content="/icons/icon-512.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #14120F; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    #game-container {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      max-width: 100vw; max-height: 100vh;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    @keyframes flapDown {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(-90deg); }
    }
    @keyframes flapUp {
      0% { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }
    @keyframes stampIn {
      0% { transform: scale(2.2) rotate(-8deg); opacity: 0; }
      60% { transform: scale(0.94) rotate(-8deg); opacity: 1; }
      100% { transform: scale(1) rotate(-8deg); opacity: 1; }
    }
    @keyframes runwayPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
